<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarPayUz - Gift</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo-circle">⭐</div>
            <div class="logo-text">StarPayUz</div>
        </div>
        <div class="header-right">
            <div class="balance-badge" id="balance">0 so'm</div>
            <button class="add-button" onclick="openTopup()">+</button>
        </div>
    </div>

    <!-- Content -->
    <div class="content" style="margin-top: 24px;">
        <div class="page-title">
            <span>🎁</span>
            <span>Gift olish</span>
        </div>

        <p style="color: var(--text-secondary); font-size: 15px; margin-bottom: 24px; text-align: center;">
            O'zingizga yoki do'stingizga gift yuboring
        </p>

        <!-- Gift Cards Grid -->
        <div class="gift-cards-grid">
            <div class="gift-card" onclick="selectGift('TeddyBear', 3000)">
                <div class="gift-card-emoji">🧸</div>
                <div class="gift-card-name">TeddyBear</div>
                <div class="gift-card-price">3 000 so'm</div>
            </div>

            <div class="gift-card" onclick="selectGift('HeartGift', 3000)">
                <div class="gift-card-emoji">💝</div>
                <div class="gift-card-name">HeartGift</div>
                <div class="gift-card-price">3 000 so'm</div>
            </div>

            <div class="gift-card" onclick="selectGift('GiftBox', 5000)">
                <div class="gift-card-emoji">🎁</div>
                <div class="gift-card-name">GiftBox</div>
                <div class="gift-card-price">5 000 so'm</div>
            </div>

            <div class="gift-card" onclick="selectGift('Rose', 5000)">
                <div class="gift-card-emoji">🌹</div>
                <div class="gift-card-name">Rose</div>
                <div class="gift-card-price">5 000 so'm</div>
            </div>

            <div class="gift-card" onclick="selectGift('Cake', 10000)">
                <div class="gift-card-emoji">🎂</div>
                <div class="gift-card-name">Cake</div>
                <div class="gift-card-price">10 000 so'm</div>
            </div>

            <div class="gift-card" onclick="selectGift('Bouquet', 10000)">
                <div class="gift-card-emoji">💐</div>
                <div class="gift-card-name">Bouquet</div>
                <div class="gift-card-price">10 000 so'm</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="openStars()">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Menu</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">🎁</div>
            <div class="nav-label">Gifts</div>
        </div>
        <div class="nav-item" onclick="openReyting()">
            <div class="nav-icon">🏆</div>
            <div class="nav-label">Reyting</div>
        </div>
        <div class="nav-item" onclick="openProfile()">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Profil</div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        function selectGift(name, price) {
            tg.showConfirm(
                `${name} sovg'asini ${price.toLocaleString('uz-UZ')} so'mga sotib olasizmi?`,
                (confirmed) => {
                    if (confirmed) {
                        tg.sendData(JSON.stringify({
                            action: 'buy_gift',
                            gift: name,
                            price: price
                        }));
                        tg.close();
                    }
                }
            );
        }

        function openStars() {
            window.location.href = 'stars.html';
        }

        function openReyting() {
            window.location.href = 'index.html';
        }

        function openProfile() {
            window.location.href = 'index.html';
        }

        function openTopup() {
            window.location.href = 'topup.html';
        }
    </script>
</body>
</html>
