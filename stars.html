<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarPayUz - Stars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<style>
    body {
        margin: auto;
        text-align: center;
    }

    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 35px;
    }

    .header-left__image {
        width: 60px;
        height: 60px;
    }

    .add-button {
        width: 30px;
        height: 30px;

        border: none;
        border-radius: 50%;

        background: #3B82F6;
        color: #fff;

        font-size: 23px;
        font-weight: 300;

        display: flex;
        align-items: center;
        justify-content: center;

        cursor: pointer;

        box-shadow:
            0 0 15px rgba(59, 130, 246, .4),
            0 8px 20px rgba(59, 130, 246, .25);

        transition: all .3s ease;
    }

    .add-button:hover {
        transform: translateY(-2px) scale(1.05);

        box-shadow:
            0 0 25px rgba(59, 130, 246, .6),
            0 10px 25px rgba(59, 130, 246, .35);
    }

    .add-button:active {
        transform: scale(.95);
    }

    .header-right {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .balance-badge {
        color: white;
        font-weight: 600;
        border: 2px solid #3B82F6;
        padding: 5px 8px;
        border-radius: 30px;
        font-size: 14px;
        background-color: #031632;

        cursor: pointer;
        transition: all 0.3s ease;
    }

    .balance-badge:hover {
        background-color: #3B82F6;
        transform: translateY(-2px);

        box-shadow:
            0 0 15px rgba(59, 130, 246, .4),
            0 4px 12px rgba(59, 130, 246, .3);
    }

    .balance-badge:active {
        transform: scale(0.96);
    }

    .tabs {
        background-color: rgb(58, 58, 65);
        padding: 7px 0;
        border-radius: 50px;
        display: flex;
        justify-content: space-around;
    }

    .tab {
        color: #9CA3AF;
        background: transparent;
        border: none;

        font-weight: 700;
        font-size: 15px;

        padding: 10px 10px;
        border-radius: 50px;

        cursor: pointer;
        transition: all .3s ease;
    }

    /* Наведение */
    .tab:hover {
        color: #fff;
      background: #3B82F6;
    }

    .tab.active {
        color: #fff;

        background: #3B82F6;

        box-shadow:
            0 0 15px rgba(59, 130, 246, .35),
            0 4px 12px rgba(59, 130, 246, .25);
    }

    /* Нажатие */
    .tab:active {
        transform: scale(.97);
    }
    .page-title{
        margin-top: 30px;
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
    }
    .page-title h2{
        color: #0d5ece;
    }
</style>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="/">
                <img src="./images/logo.png" alt="" class="header-left__image">
            </a>
        </div>
        <div class="header-right">
            <div class="balance-badge" id="balance">0 so'm</div>
            <button class="add-button" onclick="openTopup()">+</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab">Stars olish</button>
            <button class="tab" onclick="openPremium()">Premium olish</button>
        </div>
    </div>

    <!-- Content -->
    <div class="content">
        <div class="page-title">
                <img src="./images/star.webp" alt="" style="width: 7%; height: 7%;">
            <h2>Telegram Stars sotib olish</h2>
        </div>

        <!-- Username Input -->
        <div class="section-label">Qabul qiluvchi</div>
        <div class="input-group">
            <span class="input-icon">👤</span>
            <input type="text" class="input" id="username" placeholder="Username kiriting">
            <button class="input-button" onclick="setMyUsername()">O'zim uchun</button>
        </div>

        <!-- Amount Selection -->
        <div class="section-label">Stars miqdori</div>
        <div class="amount-box">
            <div class="amount-display">
                <div class="amount-display-left">
                    <span class="amount-icon">📝</span>
                    <span class="amount-label">Stars miqdori</span>
                </div>
                <div class="amount-value" id="displayAmount">0 so'm</div>
            </div>

            <div class="buttons-row">
                <button class="amount-btn" onclick="selectAmount(50, 10000)">50</button>
                <button class="amount-btn" onclick="selectAmount(75, 14000)">75</button>
                <button class="amount-btn" onclick="selectAmount(100, 18000)">100</button>
                <button class="amount-btn" onclick="selectAmount(250, 45000)">250</button>
                <button class="amount-btn" onclick="selectAmount(500, 85000)">500</button>
            </div>
        </div>

        <!-- Buy Button -->
        <button class="btn-primary" id="buyBtn" onclick="buyStars()" disabled>Sotib olish</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Menu</div>
        </div>
        <div class="nav-item" onclick="openGifts()">
            <div class="nav-icon">🎁</div>
            <div class="nav-label">Gifts</div>
        </div>
        <div class="nav-item" onclick="openReyting()">
            <div class="nav-icon">🏆</div>
            <div class="nav-label">Reyting</div>
        </div>
        <div class="nav-item" onclick="openProfile()">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Profil</div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        let selectedStars = 0;
        let selectedPrice = 0;

        function selectAmount(stars, price) {
            selectedStars = stars;
            selectedPrice = price;

            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('selected');
            });

            event.target.classList.add('selected');

            document.getElementById('displayAmount').textContent = price.toLocaleString('uz-UZ') + ' so\'m';
            document.getElementById('buyBtn').disabled = false;
        }

        function setMyUsername() {
            const initData = tg.initDataUnsafe;
            if (initData.user && initData.user.username) {
                document.getElementById('username').value = '@' + initData.user.username;
                tg.showPopup({
                    title: '✅ Tasdiqlandi',
                    message: 'Sizning username o\'rnatildi',
                    buttons: [{ type: 'ok' }]
                });
            } else {
                tg.showAlert('Username topilmadi');
            }
        }

        function buyStars() {
            if (selectedStars === 0) {
                tg.showAlert('Iltimos, miqdorni tanlang!');
                return;
            }

            const username = document.getElementById('username').value;
            if (!username || username === '@') {
                tg.showAlert('Iltimos, username kiriting!');
                return;
            }

            tg.sendData(JSON.stringify({
                action: 'buy_stars',
                amount: selectedStars,
                price: selectedPrice,
                username: username
            }));

            tg.close();
        }

        function openPremium() {
            window.location.href = 'premium.html';
        }

        function openTopup() {
            window.location.href = 'topup.html';
        }

        function openGifts() {
            window.location.href = 'gift.html';
        }

        function openReyting() {
            window.location.href = 'index.html';
        }

        function openProfile() {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
