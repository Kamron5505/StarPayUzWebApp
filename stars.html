<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarPayUz - Stars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        background: #030712;
        color: #fff;
        padding: 20px;
        padding-bottom: 180px;
    }

    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 35px;
    }

    .header-left__image {
        width: 60px;
        height: 60px;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .balance-badge {
        color: #fff;
        font-weight: 600;
        border: 2px solid #3B82F6;
        background: #031632;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 14px;
        transition: .3s;
    }

    .balance-badge:hover {
        background: #3B82F6;
        box-shadow: 0 0 20px rgba(59, 130, 246, .35);
    }

    .add-button {
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 50%;
        background: #3B82F6;
        color: #fff;
        font-size: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: .3s;
        box-shadow: 0 0 20px rgba(59, 130, 246, .3);
    }

    .add-button:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 0 30px rgba(59, 130, 246, .5);
    }

    .tabs {
        display: flex;
        padding: 5px;
        background: #111827;
        border-radius: 999px;
        gap: 5px;
        margin-bottom: 25px;
    }

    .tab {
        flex: 1;
        border: none;
        background: transparent;
        color: #9CA3AF;
        font-size: 15px;
        font-weight: 700;
        padding: 14px;
        border-radius: 999px;
        cursor: pointer;
        transition: .3s;
    }

    .tab:hover {
        color: #fff;
        background: rgba(59, 130, 246, .15);
    }

    .tab.active {
        background: #3B82F6;
        color: #fff;
        box-shadow:
            0 0 20px rgba(59, 130, 246, .4),
            0 4px 12px rgba(59, 130, 246, .25);
    }

    .page-title {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 25px;
    }

    .page-title h2 {
        color: #3B82F6;
        font-size: 22px;
        font-weight: 700;
    }

    .section-label {
        display: block;
        color: #fff;
        font-weight: 600;
        margin-bottom: 10px;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 25px;
    }

    .inside-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 22px;
        height: 22px;
    }

    .input {
        width: 100%;
        height: 56px;
        background: #111827;
        border: 2px solid #3B82F6;
        border-radius: 18px;
        padding-left: 50px;
        padding-right: 15px;
        color: #fff;
        font-size: 16px;
        outline: none;
        transition: .3s;
    }

    .input::placeholder {
        color: #9CA3AF;
    }

    .input:focus {
        box-shadow: 0 0 20px rgba(59, 130, 246, .35);
    }

    .content {
        margin-top: 20px;
    }

    .amount-box {
        background: #111827;
        border: 2px solid #3B82F6;
        border-radius: 22px;
        padding: 18px;
        margin-top: 10px;
    }

    .amount-display {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .amount-display-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .amount-icon {
        font-size: 22px;
    }

    .amount-label {
        color: #9CA3AF;
        font-size: 16px;
        font-weight: 600;
    }

    .amount-value {
        color: #3B82F6;
        font-size: 20px;
        font-weight: 700;
    }

    .buttons-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
    }

    .amount-btn {
        background: #1E293B;
        border: none;
        border-radius: 16px;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        padding: 14px 0;
        cursor: pointer;
        transition: .3s;
    }

    .amount-btn:hover {
        transform: translateY(-2px);
        background: #2b3a52;
    }

    .amount-btn.selected {
        background: #3B82F6;
        box-shadow:
            0 0 20px rgba(59, 130, 246, .45),
            0 4px 15px rgba(59, 130, 246, .25);
    }

    .purchase-bar {
        position: fixed;
        left: 20px;
        right: 20px;
        bottom: 100px;
        z-index: 200;
    }

    .btn-primary {
        width: 100%;
        height: 58px;
        margin-top: 25px;

        border: none;
        border-radius: 18px;

        background: #3B82F6 !important;
        color: #fff !important;

        font-size: 18px;
        font-weight: 700;

        cursor: pointer;
        pointer-events: auto;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;

        transition: .3s;

        box-shadow:
            0 0 25px rgba(59, 130, 246, .3);
    }

    .purchase-bar .btn-primary {
        margin-top: 0;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow:
            0 0 35px rgba(59, 130, 246, .45);
    }

    .btn-primary:disabled {
        opacity: .5;
        cursor: not-allowed;
    }

    .bottom-nav {
        position: fixed;
        left: 15px;
        right: 15px;
        bottom: 15px;
        z-index: 50;

        background: #111827;

        border: 1px solid rgba(255, 255, 255, .05);

        border-radius: 28px;

        padding: 15px 10px;

        display: flex;
        justify-content: space-around;

        backdrop-filter: blur(20px);
        pointer-events: auto;
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;

        color: #9CA3AF;

        cursor: pointer;

        transition: .3s;
    }

    .nav-item:hover {
        color: #fff;
    }

    .nav-item.active {
        color: #3B82F6;
    }

    .nav-icon {
        font-size: 24px;
    }

    .nav-label {
        font-size: 13px;
        font-weight: 600;
    }

    .custom-stars {
        margin-bottom: 15px;
    }

    .amount-hint {
        color: #9CA3AF;
        font-size: 13px;
        margin: -15px 0 20px 4px;
    }
</style>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="/">
                <img src="./images/logo.png" alt="" class="header-left__image">
            </a>
        </div>
        <div class="header-right">
            <div class="balance-badge" id="balance">0 so'm</div>
            <button class="add-button" onclick="openTopup()">+</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" onclick="openStars()">Stars olish</button>
            <button class="tab" onclick="openPremium()">Premium olish</button>
        </div>
    </div>

    <!-- Content -->
    <div class="content">
        <div class="page-title">
            <img src="./images/star.webp" alt="" style="width: 7%; height: 7%;">
            <h2>Telegram Stars sotib olish</h2>
        </div>

        <!-- Username Input -->
        <h3 class="section-label">Qabul qiluvchi</h3>
        <div class="input-wrapper">
            <img src="./images/user.webp" class="inside-icon">
            <input type="text" id="username" placeholder="Username kiriting" class="input">
        </div>

        <!-- Amount Selection -->
        <h3 class="section-label">Stars miqdori</h3>
        <div class="input-wrapper custom-stars">
            <img src="./images/star-input.webp" class="inside-icon" alt="star">
            <input type="number" id="customStars" class="input" placeholder="50 — 1 000 000" min="50" max="1000000" step="1">
        </div>
        <p class="amount-hint">Minimal: 50 · Maksimal: 1 000 000 stars</p>

        <div class="buttons-row">
            <button type="button" class="amount-btn" onclick="selectAmount(50, 10000, this)">50</button>
            <button type="button" class="amount-btn" onclick="selectAmount(75, 15000, this)">75</button>
            <button type="button" class="amount-btn" onclick="selectAmount(100, 20000, this)">100</button>
            <button type="button" class="amount-btn" onclick="selectAmount(250, 50000, this)">250</button>
            <button type="button" class="amount-btn" onclick="selectAmount(500, 100000, this)">500</button>
        </div>
    </div>

    <div class="purchase-bar">
        <button type="button" class="btn-primary" id="buyBtn">Sotib olish</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="openStars()">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Menu</div>
        </div>
        <div class="nav-item" onclick="openGifts()">
            <div class="nav-icon">🎁</div>
            <div class="nav-label">Gifts</div>
        </div>
        <div class="nav-item" onclick="openReyting()">
            <div class="nav-icon">🏆</div>
            <div class="nav-label">Reyting</div>
        </div>
        <div class="nav-item" onclick="openProfile()">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Profil</div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        let selectedStars = 0;
        let selectedPrice = 0;

        document.getElementById('customStars').addEventListener('input', function () {
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
            const check = validateStarsAmount(this.value);
            if (check.ok) {
                selectedStars = check.value;
                selectedPrice = 0;
            } else {
                selectedStars = 0;
                selectedPrice = 0;
            }
        });

        function selectAmount(stars, price, btn) {
            const check = validateStarsAmount(stars);
            if (!check.ok) {
                tg.showAlert(check.message);
                return;
            }
            selectedStars = check.value;
            selectedPrice = price;

            document.getElementById('customStars').value = stars;
            document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
            if (btn) btn.classList.add('selected');
        }

        document.addEventListener('DOMContentLoaded', function () {
            const defaultBtn = document.querySelector('.amount-btn');
            if (defaultBtn) {
                selectAmount(50, 10000, defaultBtn);
            }
            setupPurchaseButton(buyStars, 'Sotib olish');
        });

        function setMyUsername() {
            const initData = tg.initDataUnsafe;
            if (initData.user && initData.user.username) {
                document.getElementById('username').value = '@' + initData.user.username;
                tg.showPopup({
                    title: '✅ Tasdiqlandi',
                    message: 'Sizning username o\'rnatildi',
                    buttons: [{ type: 'ok' }]
                });
            } else {
                tg.showAlert('Username topilmadi');
            }
        }

        function buyStars() {
            const customVal = document.getElementById('customStars').value;
            const check = validateStarsAmount(customVal || selectedStars);
            if (!check.ok) {
                tg.showAlert(check.message);
                return;
            }
            selectedStars = check.value;

            const username = getUsername('username');
            if (!username) {
                tg.showAlert('Iltimos, username kiriting!');
                return;
            }

            submitOrder({
                action: 'buy_stars',
                amount: selectedStars,
                price: selectedPrice,
                username: username
            });
        }

        function openStars() {
            window.location.href = 'stars.html';
        }

        function openPremium() {
            window.location.href = 'premium.html';
        }

        function openTopup() {
            window.location.href = 'topup.html';
        }

        function openGifts() {
            window.location.href = 'gift.html';
        }

        function openReyting() {
            window.location.href = 'index.html';
        }

        function openProfile() {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
